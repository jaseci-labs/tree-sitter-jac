name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tooling
        run: |
          npm install -g tree-sitter-cli@0.22.6
          python -m pip install --quiet jaclang=="$(cat .jaclang-version)"

      - name: Build parser
        run: |
          jac run grammar.jac
          tree-sitter generate --no-bindings src/grammar.json

      - name: Run corpus tests
        run: tree-sitter test

      - name: Parse examples
        run: bash test/parse-clean.sh examples/sample.jac
